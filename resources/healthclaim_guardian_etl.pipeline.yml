# The main pipeline for healthclaim_guardian

resources:
  pipelines:
    healthclaim_guardian_etl:
      name: healthclaim_guardian_etl
      catalog: ${var.catalog}
      schema: ${var.schema}
      root_path: "../src/healthclaim_guardian_etl"

      libraries:
        - glob:
            include: ../src/healthclaim_guardian_etl/transformations/**

      environment:
        dependencies:
          # We include every dependency defined by pyproject.toml by defining an editable environment
          # that points to the folder where pyproject.toml is deployed.
          - --editable ${workspace.file_path}
